<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    <title>Dragonfly Live Music Pub - Digital Menu</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      // Initialize Netlify Identity widget with site configuration
      if (window.netlifyIdentity) {
        // Extract site name from current domain or use default
        const hostname = window.location.hostname;
        const siteId = hostname.includes('netlify.app') ? 
          hostname.split('.')[0] : 
          'dragonflyenu';
        
        // Configure the widget
        window.netlifyIdentity.init({
          container: '#root',
          onError: console.error
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
